<!DOCTYPE html>
<html>
<head>
	<title>Контакти</title>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="css/style.css">
		</head>
		<body>
			<h4>Створити новий обліковий запис</h4>
			<div>
				<form name="user_form" action="#" method="post">
				<label for="login">Логін</label>
				<br>
				<input type="text" name="login" placeholder="Логін" id="login" size="35" required>
				<br>
				<label for="email">Електронна скринька</label>
				<br>
				<input type="email" name="email" placeholder="Електронна скринька" id="email" size="35" required>
				<br>
				<label for="password">Пароль</label>
				<br>
				<input type="password" name="password" placeholder="Пароль" id="password" size="35" required>
				<br>
				<input type="submit" name="submit" id="submit" value="Відправити">
			    </form>
			</div>		
		</body>
</html>
